<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GPA Calculator</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 420px;
}
h2 {
    text-align: center;
}
.subject {
    display: flex;
    margin-bottom: 10px;
}
.subject input, .subject select {
    padding: 8px;
    margin-right: 5px;
}
button {
    padding: 10px;
    background: #667eea;
    color: white;
    border: none;
    cursor: pointer;
    width: 100%;
    margin-top: 10px;
}
.result {
    text-align: center;
    margin-top: 15px;
    font-size: 20px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <h2>GPA Calculator</h2>

    <div id="subjects"></div>

    <button onclick="addSubject()">+ Add Subject</button>
    <button onclick="calculateGPA()">Calculate GPA</button>

    <div class="result" id="result"></div>
</div>

<script>
function addSubject() {
    let div = document.createElement("div");
    div.className = "subject";

    div.innerHTML = `
        <input type="text" placeholder="Subject">
        <input type="number" placeholder="Credits" min="1">
        <select>
            <option value="10">O (10)</option>
            <option value="9">A+ (9)</option>
            <option value="8">A (8)</option>
            <option value="7">B+ (7)</option>
            <option value="6">B (6)</option>
            <option value="5">C (5)</option>
            <option value="0">F (0)</option>
        </select>
    `;

    document.getElementById("subjects").appendChild(div);
}

function calculateGPA() {
    let subjects = document.querySelectorAll(".subject");
    let totalCredits = 0;
    let totalPoints = 0;

    subjects.forEach(sub => {
        let credits = parseFloat(sub.children[1].value);
        let grade = parseFloat(sub.children[2].value);

        if (!isNaN(credits)) {
            totalCredits += credits;
            totalPoints += credits * grade;
        }
    });

    let gpa = totalCredits ? (totalPoints / totalCredits).toFixed(2) : 0;

    document.getElementById("result").innerText = "GPA: " + gpa;
}

// Add default subjects
addSubject();
addSubject();
</script>

</body>
</html>
